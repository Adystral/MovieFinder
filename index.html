<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search Webapp</title>
    <!-- CSS file -->
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <h1>Movie Search</h1>

        <div class="search-box">
            <input type="text" id="movie-input" placeholder="Enter a movie name (e.g. Batman)...">
            <button id="search-btn">Search</button>
        </div>

        <div id="movie-result"></div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
